services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: shellbee-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck", "-m", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  z2m-bridge:
    build: ./docker/z2m-ws-bridge
    container_name: shellbee-z2m
    depends_on:
      mosquitto:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - Z2M_TOPIC=zigbee2mqtt
      - WS_PORT=8080
      - HEALTH_PORT=8081
      - AUTH_TOKEN=shellbee-integration-token
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  seeder:
    build: ./docker/seeder
    container_name: shellbee-seeder
    depends_on:
      mosquitto:
        condition: service_healthy
      z2m-bridge:
        condition: service_healthy
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - Z2M_TOPIC=zigbee2mqtt
      - MODE=continuous
      - SEED_INTERVAL=10
    restart: unless-stopped

volumes:
  mosquitto-data:
