name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45

    env:
      SCHEME: Shellbee
      DESTINATION: 'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=latest'
      DERIVED_DATA: ${{ github.workspace }}/DerivedData

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Shellbee.xcodeproj \
            -scheme "$SCHEME" \
            -derivedDataPath "$DERIVED_DATA"

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Shellbee.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO | tee build.log

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Shellbee.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA" \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 \
            CODE_SIGNING_ALLOWED=NO | tee test.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            build.log
            test.log
            ${{ env.DERIVED_DATA }}/Logs/Test/*.xcresult
          if-no-files-found: ignore
          retention-days: 7
