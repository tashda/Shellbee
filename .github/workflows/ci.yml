name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45

    env:
      SCHEME: Shellbee
      DERIVED_DATA: ${{ github.workspace }}/DerivedData

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # Pick the newest Xcode the runner image ships with. Hard-coding a
          # version tends to rot because GitHub images churn.
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Select simulator
        id: sim
        run: |
          # Pick the newest available iPhone simulator the runner has installed.
          # Hard-coding a device name (e.g. "iPhone 17 Pro Max") fails whenever
          # the runner image lags behind local Xcode.
          xcrun simctl list devices available
          DEVICE_ID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices | to_entries[]
                       | select(.key | test("iOS|com.apple.CoreSimulator.SimRuntime.iOS"))
                       | .value[]
                       | select(.isAvailable and (.name | startswith("iPhone")))]
                     | sort_by(.name) | reverse | .[0].udid')
          if [ -z "$DEVICE_ID" ] || [ "$DEVICE_ID" = "null" ]; then
            echo "No iPhone simulator available on this runner" >&2
            exit 1
          fi
          echo "Selected simulator: $DEVICE_ID"
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Shellbee.xcodeproj \
            -scheme "$SCHEME" \
            -derivedDataPath "$DERIVED_DATA"

      - name: Build for testing
        env:
          DESTINATION: platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Shellbee.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO | tee build.log

      - name: Test
        env:
          DESTINATION: platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Shellbee.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA" \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 \
            CODE_SIGNING_ALLOWED=NO | tee test.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            build.log
            test.log
            ${{ env.DERIVED_DATA }}/Logs/Test/*.xcresult
          if-no-files-found: ignore
          retention-days: 7
